snapshots:
  - name: snp_erp__categories
    relation: ref('stg_erp__categories')
    config:
      schema: snapshots
      unique_key: category_pk
      strategy: check
      check_cols:
        - category_name
        - category_description
  - name: snp_erp__employees
    relation: ref('stg_erp__employees')
    config:
      schema: snapshots
      unique_key: employee_pk
      strategy: check
      check_cols:
        - manager_fk
        - employee_name
        - employee_title
        - employee_birth_date
        - employee_hire_date
        - employee_city
        - employee_region
        - employee_country
  - name: snp_erp__shippers
    relation: ref('stg_erp__shippers')
    config:
      schema: snapshots
      unique_key: shipper_pk
      strategy: check
      check_cols:
        - shipper_name
  - name: snp_erp__suppliers
    relation: ref('stg_erp__suppliers')
    config:
      schema: snapshots
      unique_key: supplier_pk
      strategy: check
      check_cols:
        - supplier_name
        - supplier_city
        - supplier_country
