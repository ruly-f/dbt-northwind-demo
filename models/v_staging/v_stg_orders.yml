models:
  - name: v_stg_orders
    description: >
      Orders' data vault stg model.
    columns:
      - name: order_pk
        description: the order's unique identifier
      
      - name: employee_fk
        description: the employee's foreign key

      - name: customer_fk
        description: the customer's foreign key

      - name: shipper_fk
        description: the shipper's foreign key
      
      - name: order_number
        description: The natural key of the source table
      
      - name: order_date
        description: The date the order has been computed
      
      - name: ship_date
        description: the date the order was shipped
      
      - name: required_delivery_date
        description: the maximum date the order is required to be delivered
      
      - name: freight
        description: the freight's total price
      
      - name: recipient_name
        description: the recipient's company name
      
      - name: recipient_city
        description: recipient's city name
      
      - name: recipient_region
        description: recipient's region name
      
      - name: recipient_country
        description: recipient's country name
      
      - name: record source
        description: data source name

      - name: load_date
        description: the loading date in the database
      
      - name: effective_from
        description: the day since this business rule is effective
      
      - name: order_hk
        description: the unique identifier for each order item
        data_tests:
          - unique
          - not_null

      - name: customer_hk
        description: the hask key for each customer
        data_tests:
          - not_null

      - name: employee_hk
        description: the hash key for each employee
        data_tests:
          - not_null
      
      - name: shipper_hk
        description: the hash key for each shipper
        data_tests:
          - not_null
        
      - name: order_customer_hk
        description: the hask key for each order-customer unique relationship
        data_tests:
          - unique
          - not_null

      - name: order_employee_hk
        description: the hash key for each order-employee unique relationship
        data_tests:
          - unique
          - not_null
      
      - name: order_shipper_hk
        description: the hash key for each order-shipper unique relationship
        data_tests:
          - unique
          - not_null
          
      - name: order_hashdiff
        description: hash key generated by a unique combination of the descriptive columns
        data_tests:
          - unique
          - not_null
