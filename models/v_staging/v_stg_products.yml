models:
  - name: v_stg_products
    description: >
      The products' data vault stg model.
    columns:
      - name: product_pk
        description: the product's unique identifier
      
      - name: supplier_fk
        description: the supplier's foreign key

      - name: category_fk
        description: the category's foreign key

      - name: product_name
        description: the product's company name
      
      - name: quantity_per_unit
        description: the total quantity that comes in one unit of the product
      
      - name: unit_price
        description: The total price of one unit of the product
      
      - name: units_in_stock
        description: Number of units currently in stock.

      - name: units_on_order
        description: Number of units currently on order.

      - name: reorder_level
        description: Stock level that triggers a reorder.

      - name: is_discontinued
        description: Indicates whether the product is discontinued.
      
      - name: record source
        description: data source name

      - name: load_date
        description: the loading date in the database
      
      - name: effective_from
        description: the day since this business rule is effective
      
      - name: product_hk
        description: the unique identifier for each product
        data_tests:
          - not_null

      - name: category_hk
        description: the hask key for each category
        data_tests:
          - not_null

      - name: supplier_hk
        description: the hash key for each supplier
        data_tests:
          - not_null
        
      - name: product_category_hk
        description: the hask key for each product-category unique relationship
        data_tests:
          - unique
          - not_null

      - name: product_supplier_hk
        description: the hash key for each product-supplier unique relationship
        data_tests:
          - unique
          - not_null
          
      - name: product_hashdiff
        description: hash key generated by a unique combination of the descriptive columns
        data_tests:
          - unique
          - not_null
