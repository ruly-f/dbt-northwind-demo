models:
  - name: v_stg_employees
    description: >
      Employees' data vault stg model.
    columns:
      - name: employee_pk
        description: employee's primary key

      - name: manager_fk
        description: manager's identifier
      
      - name: employee_name
        description: the employee's name
      
      - name: employee_title
        description: the employee's title name
      
      - name: employee_city
        description: employee's city name
      
      - name: employee_region
        description: employee's region location name
      
      - name: employee_country
        description: employee's country name
      
      - name: record source
        description: data source name
      
      - name: load_date
        description: loading date
      
      - name: effective_from
        description: the day since this business rule is effective
      
      - name: employee_hk
        description: employee unique hash key
        data_tests:
          - unique
          - not_null
          
      - name: employee_hashdiff
        description: hash key generated by a unique combination of descriptive columns
        data_tests:
          - unique
          - not_null
