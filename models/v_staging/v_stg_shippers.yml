models:
  - name: v_stg_shippers
    description: >
      The shippers' data vault stg model.
    columns:
      - name: shipper_pk
        description: the shipper's primary key
      
      - name: shipper_name
        description: the shipper's company name
      
      - name: record source
        description: data source name
      
      - name: load_date
        description: loading date
      
      - name: effective_from
        description: the day since this business rule is effective
      
      - name: shipper_hk
        description: shipper unique hash key
        data_tests:
          - unique
          - not_null
          
      - name: shipper_hashdiff
        description: hash key generated by a unique combination of descriptive columns
        data_tests:
          - unique
          - not_null
