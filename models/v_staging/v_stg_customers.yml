models:
  - name: v_stg_customers
    description: >
      Customers' data vault stg model.
    columns:
      - name: customer_pk
        description: customer's primary key
      
      - name: customer_company_name
        description: the customer's company name
      
      - name: customer_city
        description: customer's city name
      
      - name: customer_region
        description: customer's region location name
      
      - name: customer_country
        description: customer's country name
      
      - name: record source
        description: data source name
      
      - name: load_date
        description: loading date
      
      - name: effective_from
        description: the day since this business rule is effective
      
      - name: customer_hk
        description: customer unique hash key
        data_tests:
          - not_null
          
      - name: customer_hashdiff
        description: hash key generated by a unique combination of descriptive columns
        data_tests:
          - unique
          - not_null
