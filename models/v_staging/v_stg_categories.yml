models:
  - name: v_stg_categories
    description: >
      Product's categories data vault stg model.
    columns:
      - name: category_pk
        description: product category primary key
      
      - name: category_name
        description: product's category name
      
      - name: category description
        description: product's  category description
      
      - name: record source
        description: data source name
      
      - name: load_date
        description: loading date
      
      - name: effective_from
        description: the day since this business rule is effective
      
      - name: category_hk
        description: product category hash key
        data_tests:
          - not_null
          
      - name: category_hashdiff
        description: hash key generated by a unique combination of descriptive columns
        data_tests:
          - unique
          - not_null
