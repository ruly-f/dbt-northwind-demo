models:
  - name: v_stg_suppliers
    description: >
      The suppliers' data vault stg model.
    columns:
      - name: supplier_pk
        description: the supplier's primary key
      
      - name: supplier_name
        description: the supplier's company name
      
      - name: supplier_city
        description: supplier's city name
      
      - name: supplier_country
        description: supplier's country name
      
      - name: record source
        description: data source name
      
      - name: load_date
        description: loading date
      
      - name: effective_from
        description: the day since this business rule is effective
      
      - name: supplier_hk
        description: supplier unique hash key
        data_tests:
          - not_null
          
      - name: supplier_hashdiff
        description: hash key generated by a unique combination of descriptive columns
        data_tests:
          - unique
          - not_null
