models:
  - name: v_stg_order_items
    description: >
      Order details' data vault stg model.
    columns:
      - name: order_fk
        description: the order's identifier

      - name: product_fk
        description: the product's identifier
      
      - name: discount_pct
        description: The discount percentage
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      
      - name: unit_price
        description: The price of one product's unit
      
      - name: quantity
        description: the number of units of that product in that order
      
      - name: record source
        description: data source name
      
      - name: load_date
        description: the loading date in the database
      
      - name: effective_from
        description: the day since this business rule is effective
      
      - name: order_item_hk
        description: the unique identifier for each order item
        data_tests:
          - not_null

      - name: order_hk
        description: the hask key for each order
        data_tests:
          - not_null

      - name: product_hk
        description: the hash key for each product
        data_tests:
          - not_null
          
      - name: order_item_hashdiff
        description: hash key generated by a unique combination of descriptive columns
        data_tests:
          - unique
          - not_null
