models:
  - name: fct_orders
    description: Order-grain fact table (one row per order) with total sales and freight metrics.
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    metrics:
      - name: net_sales
        label: Net Sales
        description: Sum of order-level sales after discounts.
        type: simple
        agg: sum
        expr: net_total

      - name: orders_count
        label: Orders Count
        description: Count of orders at the order grain.
        type: simple
        agg: count
        expr: 1

      - name: gross_sales
        label: Gross Sales
        description: Sum of order-level sales before discounts.
        type: simple
        agg: sum
        expr: gross_total

      - name: total_freight
        label: Total Freight
        description: Sum of freight charges at the order level.
        type: simple
        agg: sum
        expr: freight_total

      - name: avg_order_value
        label: Average Order Value
        description: Average order value computed as total sales divided by orders count.
        type: derived
        expr: coalesce(net_sales / nullif(orders, 0), 0)
        input_metrics:
          - name: net_sales
          - name: orders_count
            alias: orders
    columns:
      - name: order_pk
        description: Primary key of the order fact table.
        data_tests:
          - unique
          - not_null
        entity:
          type: primary
          name: sales_order

      - name: order_number
        description: Business identifier for the order.
        dimension:
          type: categorical

      - name: employee_fk
        description: Foreign key referencing the employee who captured the order.
        entity:
          type: foreign
          name: employee

      - name: customer_fk
        description: Foreign key referencing the customer who placed the order.
        entity:
          type: foreign
          name: customer

      - name: shipper_fk
        description: Foreign key referencing the shipper used for delivery.
        entity:
          type: foreign
          name: shipper

      - name: order_date
        description: Date when the order was placed.
        granularity: day
        dimension:
          type: time

      - name: ship_date
        description: Date when the order was shipped.
        granularity: day
        dimension:
          type: time

      - name: required_delivery_date
        description: Date the customer requested the order to be delivered.
        granularity: day
        dimension:
          type: time

      - name: freight_total
        description: Total freight cost charged for the entire order.

      - name: total_quantity
        description: Total number of units included in the order.

      - name: gross_total
        description: Total order amount before discounts.

      - name: net_total
        description: Total order amount after discounts.

      - name: line_item_count
        description: Number of distinct line items in the order.

      - name: had_discount_flag
        description: Indicates whether at least one line in the order received a discount.
        dimension:
          type: categorical

      - name: recipient_name
        description: Name on the shipping label.
        dimension:
          type: categorical

      - name: recipient_city
        description: City where the order was delivered.
        dimension:
          type: categorical

      - name: recipient_region
        description: Region where the order was delivered.
        dimension:
          type: categorical

      - name: recipient_country
        description: Country where the order was delivered.
        dimension:
          type: categorical
