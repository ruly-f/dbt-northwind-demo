models:
  - name: dim_products
    description: Model that enriches product data with category and supplier information.
    columns:
      - name: product_pk
        description: Unique identifier for each product.

      - name: product_hk
        description: Snapshot hash key identifying the specific version of the product record.
        data_tests:
          - unique
          - not_null

      - name: supplier_fk
        description: Foreign key referencing the supplier providing the product.

      - name: category_fk
        description: Foreign key referencing the category of the product.

      - name: product_name
        description: Name of the product.

      - name: quantity_per_unit
        description: Description of the quantity contained in one unit.

      - name: unit_price
        description: Price per unit of the product.

      - name: units_in_stock
        description: Number of units currently in stock.

      - name: units_on_order
        description: Number of units currently on order.

      - name: reorder_level
        description: Stock level that triggers a reorder.

      - name: is_discontinued
        description: Indicates whether the product is discontinued.

      - name: product_active
        description: Flag indicating if this row represents the current active version of the product.

      - name: category_name
        description: Name of the category associated with the product.

      - name: supplier_name
        description: Name of the supplier for the product.

      - name: supplier_city
        description: City where the supplier is located.

      - name: supplier_country
        description: Country where the supplier is located.

      - name: load_ts
        description: Source system load timestamp for this product snapshot.

      - name: insert_ts
        description: Timestamp when the record was inserted into the warehouse layer.

      - name: valid_from
        description: Timestamp indicating when this product version became effective.

      - name: valid_to
        description: Timestamp indicating when this product version ceased to be effective.
